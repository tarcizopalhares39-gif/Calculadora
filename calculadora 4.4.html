<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculadora AMOLED Neon — Tarcizo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg:        #000000;
        --calc-bg:   #060608;
        --btn-bg:    #0c0c10;
        --btn-bg2:   #0f0f14;
        --cyan:      #00e5ff;
        --pink:      #ff2a6d;
        --purple:    #bf00ff;
        --yellow:    #ffea00;
        --green:     #00ff9f;
        --shadow-d:  #000000;
        --shadow-l:  #1a1a22;
        --glass:     rgba(255,255,255,0.03);
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100dvh;
        background: var(--bg);
        font-family: 'DM Sans', sans-serif;
        user-select: none;
        overflow: hidden;
    }

    /* Fundo com partículas neon sutis */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0,229,255,0.04) 0%, transparent 60%),
            radial-gradient(ellipse 50% 30% at 80% 20%, rgba(255,42,109,0.04) 0%, transparent 60%),
            radial-gradient(ellipse 40% 50% at 60% 60%, rgba(191,0,255,0.03) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .calculator {
        position: relative;
        z-index: 1;
        /* Em 16:9 a altura é o fator limitante — usamos ela como base */
        height: min(96dvh, 860px);
        /* Largura proporcional a uma calculadora: ~55% da altura */
        width: min(92vw, calc(min(96dvh, 860px) * 0.54));
        background: linear-gradient(160deg, #0a0a0f 0%, #060608 40%, #080810 100%);
        border-radius: 36px;
        padding: 16px 18px 18px;
        border: 1px solid rgba(0,229,255,0.25);
        box-shadow:
            0 0 0 1px rgba(0,0,0,0.8),
            0 0 30px rgba(0,229,255,0.12),
            0 0 80px rgba(0,229,255,0.05),
            inset 0 1px 0 rgba(255,255,255,0.05),
            inset 0 0 40px rgba(0,229,255,0.03);
        display: flex;
        flex-direction: column;
        gap: 10px;
        animation: floatIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes floatIn {
        from { opacity: 0; transform: translateY(30px) scale(0.96); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Linha decorativa topo */
    .calculator::before {
        content: '';
        position: absolute;
        top: -1px; left: 15%; right: 15%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--cyan), transparent);
        border-radius: 2px;
        box-shadow: 0 0 12px var(--cyan);
    }

    /* Brand */
    .brand-name {
        text-align: center;
        font-family: 'DM Sans', sans-serif;
        color: var(--cyan);
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 4px;
        text-shadow: 0 0 10px rgba(0,229,255,0.7);
        opacity: 0.7;
        flex-shrink: 0;
    }

    /* ── DISPLAY ── */
    .display-container {
        background: linear-gradient(145deg, #050507, #080810);
        border-radius: 22px;
        padding: 16px 18px 14px;
        border: 1px solid rgba(0,229,255,0.1);
        box-shadow:
            inset 0 2px 12px rgba(0,0,0,0.8),
            inset 0 0 0 1px rgba(255,255,255,0.02);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        gap: 6px;
        min-height: min(210px, 26vh);
    }

    #normal-mode { display: flex; flex-direction: column; flex-grow: 1; }

    .tier-top {
        height: 36px;
        color: var(--yellow);
        font-family: 'DM Mono', monospace;
        font-size: clamp(1rem, 2.8vmin, 1.35rem);
        font-weight: 400;
        text-align: right;
        text-shadow: 0 0 10px rgba(255,234,0,0.5);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        overflow-x: auto;
        white-space: nowrap;
        letter-spacing: 0.5px;
        font-variant-numeric: tabular-nums;
    }
    .tier-top::-webkit-scrollbar { height: 0; }

    .tier-main {
        flex-grow: 1;
        font-family: 'DM Mono', monospace;
        color: #ffffff;
        text-shadow: 0 0 20px rgba(255,255,255,0.4), 0 0 40px rgba(0,229,255,0.2);
        font-size: clamp(2.4rem, 8vmin, 4rem);
        font-weight: 500;
        text-align: right;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        overflow: hidden;
        font-variant-numeric: tabular-nums;
        word-break: break-all;
        transition: color 0.2s;
    }
    .tier-main.result-flash {
        animation: resultFlash 0.35s ease;
    }
    @keyframes resultFlash {
        0%   { color: var(--cyan); text-shadow: 0 0 30px var(--cyan), 0 0 60px rgba(0,229,255,0.4); }
        100% { color: #ffffff; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
    }

    /* Modo R3 */
    #r3-mode { display: none; flex-direction: column; flex-grow: 1; justify-content: center; gap: 12px; padding: 4px 0; }
    .r3-row { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }

    .r3-box {
        background: transparent;
        border-bottom: 2px solid #222;
        width: 42%;
        color: #fff;
        font-family: 'DM Mono', monospace;
        font-size: 1.6rem;
        font-weight: 800;
        text-align: center;
        padding: 4px;
        min-height: 38px;
        cursor: pointer;
        transition: all 0.25s ease;
    }
    .r3-box.active {
        border-bottom: 2px solid var(--yellow);
        color: var(--yellow);
        text-shadow: 0 0 10px rgba(255,234,0,0.6);
        box-shadow: 0 8px 12px -10px rgba(255,234,0,0.4);
    }
    .r3-box.active::after { content: '|'; animation: blink 1s infinite; font-weight: 400; }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    .r3-arrow {
        color: var(--pink);
        font-weight: bold;
        font-size: 1.6rem;
        text-shadow: 0 0 8px var(--pink);
    }

    /* Área de Salvos */
    .tier-pinned {
        height: 44px;
        background: rgba(0,0,0,0.3);
        border-radius: 12px;
        padding: 4px 6px;
        display: flex;
        align-items: center;
        gap: 6px;
        overflow-x: auto;
        border: 1px solid rgba(191,0,255,0.15);
    }
    .tier-pinned::-webkit-scrollbar { height: 0; }

    .btn-save {
        background: transparent;
        color: var(--purple);
        border: 1px solid rgba(191,0,255,0.5);
        border-radius: 9px;
        padding: 6px 10px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.85rem;
        font-weight: 800;
        letter-spacing: 1px;
        cursor: pointer;
        flex-shrink: 0;
        box-shadow: 0 0 8px rgba(191,0,255,0.2);
        text-shadow: 0 0 5px var(--purple);
        transition: all 0.15s;
    }
    .btn-save:active {
        transform: scale(0.92);
        background: rgba(191,0,255,0.15);
    }

    #pinned-area-items { display: flex; gap: 6px; }

    .pinned-wrapper {
        position: relative;
        flex-shrink: 0;
    }

    .pinned-item {
        background: rgba(255,234,0,0.07);
        color: var(--yellow);
        padding: 5px 10px;
        border-radius: 9px;
        font-family: 'DM Mono', monospace;
        font-size: 0.9rem;
        font-weight: 800;
        cursor: pointer;
        border: 1px solid rgba(255,234,0,0.3);
        white-space: nowrap;
        box-shadow: 0 0 8px rgba(255,234,0,0.1);
        text-shadow: 0 0 5px var(--yellow);
        transition: transform 0.1s, background 0.15s;
    }
    .pinned-item:active { transform: scale(0.93); }

    .pinned-delete {
        position: absolute;
        top: -6px;
        right: -6px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--pink);
        color: #000;
        font-size: 0.6rem;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        border: none;
        box-shadow: 0 0 6px var(--pink);
        line-height: 1;
        padding: 0;
        opacity: 0;
        transition: opacity 0.2s, transform 0.15s;
    }
    .pinned-wrapper:hover .pinned-delete,
    .pinned-wrapper.show-delete .pinned-delete {
        opacity: 1;
    }
    .pinned-delete:active { transform: scale(0.85); }

    /* ── TECLADO ── */
    .keypad {
        display: grid;
        flex-grow: 1;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: repeat(6, 1fr);
        gap: 6px;
    }

    /* Botões */
    .btn {
        position: relative;
        background: linear-gradient(145deg, #111118, #0a0a0e);
        border: 1px solid rgba(0,229,255,0.18);
        border-radius: 14px;
        width: 100%;
        height: 100%;
        font-family: 'DM Mono', monospace;
        font-size: clamp(0.8rem, 2.8vmin, 1.35rem);
        font-weight: 500;
        color: var(--cyan);
        text-shadow: 0 0 8px rgba(0,229,255,0.5);
        cursor: pointer;
        outline: none;
        box-shadow:
            0 0 8px rgba(0,229,255,0.06),
            3px 3px 6px var(--shadow-d),
            -2px -2px 5px var(--shadow-l);
        transition: all 0.1s ease;
        overflow: hidden;
    }

    /* Brilho no hover */
    .btn::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 14px;
        background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.06), transparent 70%);
        pointer-events: none;
    }

    .btn.func {
        color: var(--pink);
        border-color: rgba(255,42,109,0.22);
        text-shadow: 0 0 8px rgba(255,42,109,0.6);
        box-shadow: 0 0 8px rgba(255,42,109,0.07), 4px 4px 8px var(--shadow-d), -2px -2px 6px var(--shadow-l);
        background: linear-gradient(145deg, #130a0e, #0e060a);
    }

    .btn.action {
        color: var(--purple);
        font-size: clamp(0.65rem, 2vmin, 0.95rem);
        letter-spacing: 1px;
        border-color: rgba(191,0,255,0.25);
        text-shadow: 0 0 8px rgba(191,0,255,0.6);
        box-shadow: 0 0 8px rgba(191,0,255,0.07), 3px 3px 6px var(--shadow-d), -2px -2px 5px var(--shadow-l);
        background: linear-gradient(145deg, #0f0813, #09060f);
    }

    .btn.equal {
        background: linear-gradient(145deg, rgba(0,229,255,0.14), rgba(0,229,255,0.07));
        border: 1px solid rgba(0,229,255,0.5);
        box-shadow: 0 0 18px rgba(0,229,255,0.2), 3px 3px 6px var(--shadow-d), -2px -2px 5px var(--shadow-l);
        color: var(--cyan);
        font-size: clamp(1.1rem, 3.5vmin, 1.6rem);
    }

    .btn.sign {
        color: var(--green);
        border-color: rgba(0,255,159,0.22);
        text-shadow: 0 0 8px rgba(0,255,159,0.5);
        box-shadow: 0 0 8px rgba(0,255,159,0.07), 3px 3px 6px var(--shadow-d), -2px -2px 5px var(--shadow-l);
        background: linear-gradient(145deg, #080f0d, #060b09);
        font-size: clamp(0.75rem, 2.5vmin, 1.1rem);
    }

    /* Pressionar — efeito neumórfico invertido */
    .btn:active {
        transform: translateY(2px) scale(0.97);
        box-shadow: inset 0 0 18px rgba(0,229,255,0.25), inset 4px 4px 8px var(--shadow-d), inset -2px -2px 6px var(--shadow-l);
        border-color: rgba(0,229,255,0.4);
    }
    .btn.func:active {
        box-shadow: inset 0 0 18px rgba(255,42,109,0.3), inset 4px 4px 8px var(--shadow-d), inset -2px -2px 6px var(--shadow-l);
        border-color: rgba(255,42,109,0.5);
    }
    .btn.action:active {
        box-shadow: inset 0 0 18px rgba(191,0,255,0.3), inset 4px 4px 8px var(--shadow-d), inset -2px -2px 6px var(--shadow-l);
        border-color: rgba(191,0,255,0.5);
    }
    .btn.equal:active {
        box-shadow: inset 0 0 25px rgba(0,229,255,0.4), inset 4px 4px 8px var(--shadow-d);
    }
    .btn.sign:active {
        box-shadow: inset 0 0 18px rgba(0,255,159,0.3), inset 4px 4px 8px var(--shadow-d), inset -2px -2px 6px var(--shadow-l);
        border-color: rgba(0,255,159,0.5);
    }

    /* Botão R3 ativo */
    .btn.active-r3 {
        background: linear-gradient(145deg, rgba(191,0,255,0.2), rgba(191,0,255,0.08)) !important;
        box-shadow: inset 0 0 20px rgba(191,0,255,0.4), 0 0 15px rgba(191,0,255,0.3) !important;
        border-color: var(--purple) !important;
    }

    /* Ripple */
    .ripple {
        position: absolute;
        border-radius: 50%;
        width: 60px; height: 60px;
        background: rgba(255,255,255,0.08);
        transform: scale(0);
        animation: rippleAnim 0.4s ease-out forwards;
        pointer-events: none;
        margin-left: -30px;
        margin-top: -30px;
    }
    @keyframes rippleAnim {
        to { transform: scale(3.5); opacity: 0; }
    }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     SPLASH SCREEN
════════════════════════════════════════════ -->
<style>
#splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: opacity 0.7s ease, transform 0.7s ease;
}
#splash.hide {
    opacity: 0;
    transform: scale(1.04);
    pointer-events: none;
}

/* Grade de linhas neon ao fundo */
#splash-grid {
    position: absolute;
    inset: -10%;
    background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridPulse 4s ease-in-out infinite;
}
@keyframes gridPulse {
    0%,100% { opacity: 0.5; }
    50%      { opacity: 1; }
}

/* Orbs de luz */
.splash-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0;
    animation: orbFloat 1.2s ease forwards;
}
.splash-orb.o1 {
    width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(0,229,255,0.18), transparent 70%);
    top: -80px; left: -80px;
    animation-delay: 0.1s;
}
.splash-orb.o2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,42,109,0.14), transparent 70%);
    bottom: -60px; right: -60px;
    animation-delay: 0.3s;
}
.splash-orb.o3 {
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(191,0,255,0.12), transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation-delay: 0.5s;
}
@keyframes orbFloat {
    to { opacity: 1; }
}

/* Anel externo girando */
.splash-ring {
    position: relative;
    width: 160px;
    height: 160px;
    margin-bottom: 36px;
}
.splash-ring::before,
.splash-ring::after {
    content: '';
    position: absolute;
    border-radius: 50%;
}
.splash-ring::before {
    inset: 0;
    border: 1.5px solid transparent;
    border-top-color: var(--cyan);
    border-right-color: rgba(0,229,255,0.3);
    animation: spinRing 2s linear infinite;
    box-shadow: 0 0 20px rgba(0,229,255,0.3), inset 0 0 20px rgba(0,229,255,0.05);
}
.splash-ring::after {
    inset: 12px;
    border: 1px solid transparent;
    border-bottom-color: var(--pink);
    border-left-color: rgba(255,42,109,0.3);
    animation: spinRing 1.4s linear infinite reverse;
    box-shadow: 0 0 15px rgba(255,42,109,0.2);
}
@keyframes spinRing {
    to { transform: rotate(360deg); }
}

/* Ícone central da calculadora */
.splash-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.2rem;
    opacity: 0;
    animation: iconIn 0.6s ease 0.5s forwards;
    filter: drop-shadow(0 0 12px var(--cyan));
}
@keyframes iconIn {
    from { opacity: 0; transform: scale(0.6); }
    to   { opacity: 1; transform: scale(1); }
}

/* Textos */
.splash-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    position: relative;
}

.splash-title {
    font-family: 'DM Mono', monospace;
    font-size: clamp(1.6rem, 6vw, 2.4rem);
    font-weight: 500;
    color: #fff;
    letter-spacing: 2px;
    opacity: 0;
    transform: translateY(16px);
    animation: textRise 0.7s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
    text-shadow: 0 0 30px rgba(255,255,255,0.3);
}
.splash-title span {
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(0,229,255,0.4);
}

.splash-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(0.7rem, 2.5vw, 0.85rem);
    font-weight: 500;
    color: rgba(255,255,255,0.35);
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(12px);
    animation: textRise 0.7s cubic-bezier(0.22,1,0.36,1) 0.9s forwards;
}

@keyframes textRise {
    to { opacity: 1; transform: translateY(0); }
}

/* Linha divisória neon */
.splash-line {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    box-shadow: 0 0 8px var(--cyan);
    animation: lineExpand 0.8s cubic-bezier(0.22,1,0.36,1) 1s forwards;
    opacity: 0.7;
}
@keyframes lineExpand {
    to { width: 180px; }
}

/* Barra de loading */
.splash-loader-wrap {
    margin-top: 48px;
    position: relative;
    width: 140px;
    height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 0.4s ease 1.1s forwards;
}
.splash-loader-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0;
    background: linear-gradient(90deg, var(--purple), var(--cyan));
    border-radius: 2px;
    box-shadow: 0 0 10px var(--cyan);
    animation: loadBar 1.6s cubic-bezier(0.4,0,0.2,1) 1.2s forwards;
}
@keyframes loadBar {
    0%   { width: 0; }
    60%  { width: 80%; }
    100% { width: 100%; }
}
@keyframes fadeIn {
    to { opacity: 1; }
}

/* Tagline final */
.splash-tag {
    margin-top: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: rgba(0,229,255,0.4);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 0.5s ease 1.3s forwards;
}
</style>

<div id="splash">
    <div id="splash-grid"></div>
    <div class="splash-orb o1"></div>
    <div class="splash-orb o2"></div>
    <div class="splash-orb o3"></div>

    <div class="splash-ring">
        <div class="splash-icon">🖩</div>
    </div>

    <div class="splash-content">
        <div class="splash-title">QUANT<span>NEON</span></div>
        <div class="splash-line"></div>
        <div class="splash-sub">by Tarcizo Palhares</div>
    </div>

    <div class="splash-loader-wrap">
        <div class="splash-loader-bar"></div>
    </div>
    <div class="splash-tag">v 5.0 · AMOLED EDITION</div>
</div>

<script>
    // Fecha splash após animação completar
    window.addEventListener('load', () => {
        setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.classList.add('hide');
            setTimeout(() => splash.remove(), 750);
        }, 3000);
    });
</script>

<div class="calculator">
    <div class="brand-name">✦ TARCIZO PALHARES DEVELOPER ✦</div>

    <div class="display-container">
        <div id="normal-mode">
            <div class="tier-top" id="history"></div>
            <div class="tier-main" id="current">0</div>
        </div>

        <div id="r3-mode">
            <div class="r3-row">
                <div class="r3-box active" id="boxA" onclick="selectR3Box('A')"></div>
                <span class="r3-arrow">→</span>
                <div class="r3-box" id="boxB" onclick="selectR3Box('B')"></div>
            </div>
            <div class="r3-row">
                <div class="r3-box" id="boxC" onclick="selectR3Box('C')"></div>
                <span class="r3-arrow">→</span>
                <div class="r3-box" id="boxX" onclick="selectR3Box('X')">X</div>
            </div>
        </div>

        <div class="tier-pinned">
            <button class="btn-save" onclick="actionFixar()">＋ Salvar</button>
            <div id="pinned-area-items"></div>
        </div>
    </div>

    <!-- TECLADO: 5 linhas × 4 colunas -->
    <div class="keypad">
        <!-- Linha 1: científica -->
        <button class="btn action" onclick="press(this); inputParen('(')"> ( </button>
        <button class="btn action" onclick="press(this); inputParen(')')"> ) </button>
        <button class="btn action" onclick="press(this); inputSqrt()">√</button>
        <button class="btn func"   onclick="press(this); inputFunc('/')">÷</button>

        <!-- Linha 2: funções -->
        <button class="btn func"   onclick="press(this); inputFunc('C')">C</button>
        <button class="btn sign"   onclick="press(this); toggleSign()">+/−</button>
        <button class="btn func"   onclick="press(this); inputFunc('%')">%</button>
        <button class="btn func"   onclick="press(this); inputFunc('*')">×</button>

        <!-- Linha 3 -->
        <button class="btn" onclick="press(this); inputNum('7')">7</button>
        <button class="btn" onclick="press(this); inputNum('8')">8</button>
        <button class="btn" onclick="press(this); inputNum('9')">9</button>
        <button class="btn func" onclick="press(this); inputFunc('-')">−</button>

        <!-- Linha 4 -->
        <button class="btn" onclick="press(this); inputNum('4')">4</button>
        <button class="btn" onclick="press(this); inputNum('5')">5</button>
        <button class="btn" onclick="press(this); inputNum('6')">6</button>
        <button class="btn func" onclick="press(this); inputFunc('+')">+</button>

        <!-- Linha 5 -->
        <button class="btn" onclick="press(this); inputNum('1')">1</button>
        <button class="btn" onclick="press(this); inputNum('2')">2</button>
        <button class="btn" onclick="press(this); inputNum('3')">3</button>
        <button class="btn action" id="btn-r3" onclick="press(this); toggleR3Mode()">R3</button>

        <!-- Linha 6 -->
        <button class="btn" onclick="press(this); inputNum('0')">0</button>
        <button class="btn" onclick="press(this); inputNum('.')">.</button>
        <button class="btn func"  onclick="press(this); inputFunc('Backspace')">⌫</button>
        <button class="btn equal" style="font-family:'DM Mono',monospace;font-size:clamp(1.1rem,3.5vmin,1.6rem);" onclick="press(this); calculate()">=</button>
    </div>
</div>

<script>
    /* ── Áudio Haptic ── */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function triggerHaptic(freq = 320) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
        if (navigator.vibrate) navigator.vibrate(18);
    }

    /* Ripple visual */
    function press(btn) {
        const r = document.createElement('span');
        r.className = 'ripple';
        r.style.left = '50%';
        r.style.top  = '50%';
        btn.appendChild(r);
        setTimeout(() => r.remove(), 420);
    }

    /* ── Estado ── */
    let expr         = '';
    let isCalculated = false;
    let isR3Mode     = false;
    let r3Data       = { A:'', B:'', C:'', X:'' };
    let activeR3Box  = 'A';

    const elCurrent = document.getElementById('current');
    const elHistory = document.getElementById('history');
    const elPinned  = document.getElementById('pinned-area-items');

    window.onload = () => updateNormalUI();

    /*
     * ── MOTOR DE EXPRESSÃO ──────────────────────────────────────────
     * expr  : string completa da expressão em construção  ex: "8+(8-"
     * Não há mais "currentInput" separado — tudo vai direto para expr.
     * Isso elimina bugs de sincronização entre array e string.
     * ────────────────────────────────────────────────────────────────
     */

    // Último char útil da expressão
    function lastChar() { return expr.trimEnd().slice(-1); }

    // Converte expr (sintaxe display) → evalStr (JS válido)
    function toEval(s) {
        return s
            .replace(/×/g, '*')
            .replace(/÷/g, '/')
            .replace(/√\(/g, 'Math.sqrt(');
    }

    // Converte expr para versão bonita no histórico
    function toDisplay(s) { return s; } // já está em display

    function inputNum(num) {
        triggerHaptic(280);
        if (isR3Mode) {
            if (activeR3Box === 'X') return;
            let val = r3Data[activeR3Box];
            if (val === '0' && num !== '.') val = '';
            if (num === '.' && val.includes('.')) return;
            if (val.length < 12) { r3Data[activeR3Box] = val + num; updateR3UI(); }
            return;
        }
        if (isCalculated) {
            // novo cálculo começa do zero
            expr = (num === '.' ? '0.' : num);
            isCalculated = false;
        } else {
            // Se o último char é ')' insere × implícito
            const lc = lastChar();
            if (lc === ')') expr += '×';
            // Evita dois pontos decimais no mesmo número
            if (num === '.') {
                // pega o número sendo digitado no momento
                const m = expr.match(/(\d*\.?\d*)$/);
                if (m && m[0].includes('.')) return;
            }
            expr += num;
        }
        updateNormalUI();
    }

    function inputParen(p) {
        triggerHaptic(290);
        if (isR3Mode) return;
        if (isCalculated) { expr = ''; isCalculated = false; }
        const lc = lastChar();
        if (p === '(') {
            // Após número ou ')' insere × implícito
            if (/[\d)]/.test(lc)) expr += '×';
            expr += '(';
        } else {
            // Só fecha se há abre-parêntese sem fechar
            const opens  = (expr.match(/\(/g) || []).length;
            const closes = (expr.match(/\)/g) || []).length;
            if (opens > closes && /[\d)]/.test(lc)) expr += ')';
        }
        updateNormalUI();
    }

    function inputSqrt() {
        triggerHaptic(320);
        if (isR3Mode) {
            if (activeR3Box === 'X') return;
            const val = parseFloat(r3Data[activeR3Box]);
            if (!isNaN(val) && val >= 0) {
                r3Data[activeR3Box] = round6(Math.sqrt(val)).toString();
                updateR3UI();
            }
            return;
        }
        if (isCalculated) { expr = ''; isCalculated = false; }
        const lc = lastChar();
        // Após número ou ')': aplica √ sobre a expressão acumulada até agora
        if (/[\d)]/.test(lc)) {
            expr = '√(' + expr + ')';
        } else {
            if (/[\d)]/.test(lc)) expr += '×';
            expr += '√(';
        }
        updateNormalUI();
    }

    function toggleSign() {
        triggerHaptic(260);
        if (isR3Mode) {
            if (activeR3Box === 'X') return;
            let val = r3Data[activeR3Box];
            if (!val || val === '0') return;
            r3Data[activeR3Box] = val.startsWith('-') ? val.slice(1) : '-' + val;
            updateR3UI();
            return;
        }
        // Inverte sinal do número sendo digitado no momento (último token numérico)
        // Estratégia: coloca -( ... ) em volta se necessário
        if (!expr) return;
        if (expr.startsWith('-(') && expr.endsWith(')')) {
            expr = expr.slice(2, -1);
        } else {
            expr = '-(' + expr + ')';
        }
        updateNormalUI();
    }

    function inputFunc(op) {
        triggerHaptic(op === 'C' ? 200 : 310);

        if (op === 'C') {
            if (isR3Mode) {
                r3Data = { A:'', B:'', C:'', X:'' };
                activeR3Box = 'A';
                updateR3UI();
            } else {
                expr = ''; isCalculated = false;
                updateNormalUI();
            }
            return;
        }

        if (op === 'Backspace') {
            if (isR3Mode) {
                if (activeR3Box !== 'X') { r3Data[activeR3Box] = r3Data[activeR3Box].slice(0, -1); updateR3UI(); }
            } else {
                if (isCalculated) { expr = ''; isCalculated = false; }
                else {
                    // Se termina com √( apaga os dois chars
                    if (expr.endsWith('√(')) expr = expr.slice(0, -2);
                    else expr = expr.slice(0, -1);
                }
                updateNormalUI();
            }
            return;
        }

        if (op === '%') {
            if (!isR3Mode && expr !== '') {
                // Pega o último número da expressão e divide por 100
                expr = expr.replace(/([\d.]+)$/, m => (parseFloat(m) / 100).toString());
                updateNormalUI();
            }
            return;
        }

        // Operadores +, -, *, /
        if (!isR3Mode) {
            const opDisplay = op === '*' ? '×' : op === '/' ? '÷' : op;
            // Se veio de um resultado calculado, expr já tem o número — só encadeia
            if (isCalculated) { isCalculated = false; }
            const lc = lastChar();
            if (lc === '') { if (op === '-') expr += '-'; return; }  // sinal inicial
            // Substitui operador anterior se digitou dois seguidos
            if ('+-×÷*/'.includes(lc)) {
                expr = expr.slice(0, -1) + opDisplay;
            } else {
                expr += opDisplay;
            }
            updateNormalUI();
        }
    }

    function round6(n) { return Math.round(n * 1000000) / 1000000; }
    function round8(n) { return Math.round(n * 100000000) / 100000000; }

    /* ── Calcular ── */
    function calculate() {
        triggerHaptic(400);
        if (isR3Mode) {
            let a = parseFloat(r3Data.A), b = parseFloat(r3Data.B), c = parseFloat(r3Data.C);
            if (!isNaN(a) && !isNaN(b) && !isNaN(c)) {
                if (a === 0) { r3Data.X = 'Erro (A=0)'; activeR3Box = 'X'; updateR3UI(); return; }
                r3Data.X = round6((b * c) / a).toString();
                activeR3Box = 'X';
                updateR3UI();
            }
            return;
        }
        if (!expr) return;

        // Fecha parênteses abertos automaticamente
        let evalExpr = expr;
        const opens  = (evalExpr.match(/\(/g) || []).length;
        const closes = (evalExpr.match(/\)/g) || []).length;
        for (let i = 0; i < opens - closes; i++) evalExpr += ')';

        const histStr = evalExpr + ' =';
        try {
            const evalStr = toEval(evalExpr);
            let result = new Function('return ' + evalStr)();
            if (!isFinite(result)) throw new Error('Infinito');
            result = round8(result);
            elHistory.innerText = histStr;
            expr = result.toString();
            isCalculated = true;
            elCurrent.innerText = formatDisplay(expr);
            elCurrent.classList.remove('result-flash');
            void elCurrent.offsetWidth;
            elCurrent.classList.add('result-flash');
        } catch(e) {
            elCurrent.innerText = 'Erro';
            expr = '';
            isCalculated = false;
        }
    }

    /* ── Formatar número no display ── */
    function formatDisplay(val) {
        if (val === 'Erro' || val.includes('Erro')) return val;
        if (val.length > 12) {
            const n = parseFloat(val);
            if (!isNaN(n)) return n.toExponential(4);
        }
        return val;
    }

    /* ── Salvar valor fixado ── */
    function actionFixar() {
        triggerHaptic(350);
        let val = isR3Mode ? r3Data[activeR3Box] : expr;
        if (!val || val === '0' || val === 'Erro' || val === 'X' || val === '') return;
        // Só salva se for um número puro (resultado calculado)
        if (!isCalculated && !isR3Mode) return;

        const wrapper = document.createElement('div');
        wrapper.className = 'pinned-wrapper';

        const item = document.createElement('div');
        item.className = 'pinned-item';
        item.innerText = val;

        const del = document.createElement('button');
        del.className = 'pinned-delete';
        del.innerText = '✕';
        del.title = 'Remover';

        let holdTimer;
        item.addEventListener('touchstart', () => {
            holdTimer = setTimeout(() => { wrapper.classList.toggle('show-delete'); }, 500);
        }, { passive: true });
        item.addEventListener('touchend', () => clearTimeout(holdTimer), { passive: true });

        item.onclick = () => {
            triggerHaptic(260);
            if (isR3Mode) {
                if (activeR3Box !== 'X') { r3Data[activeR3Box] = val; updateR3UI(); }
            } else {
                const lc = lastChar();
                if (isCalculated) {
                    // Após um resultado: começa nova expressão com o valor salvo
                    expr = val;
                    isCalculated = false;
                } else if (lc === '' || '+-×÷*/('.includes(lc)) {
                    // Expressão vazia ou último char é operador/abre-paren: insere o valor
                    expr += val;
                } else if (/[\d.]/.test(lc)) {
                    // Último char é número: insere × implícito antes do salvo
                    expr += '×' + val;
                } else {
                    expr += val;
                }
                updateNormalUI();
            }
        };

        del.onclick = (e) => {
            e.stopPropagation();
            triggerHaptic(150);
            wrapper.style.transition = 'opacity 0.2s, transform 0.2s';
            wrapper.style.opacity = '0';
            wrapper.style.transform = 'scale(0.7)';
            setTimeout(() => wrapper.remove(), 200);
        };

        wrapper.appendChild(item);
        wrapper.appendChild(del);
        elPinned.appendChild(wrapper);
        elPinned.parentElement.scrollLeft = elPinned.parentElement.scrollWidth;
    }

    /* ── Modo Regra de 3 ── */
    function toggleR3Mode() {
        triggerHaptic(300);
        isR3Mode = !isR3Mode;
        const btnR3    = document.getElementById('btn-r3');
        const viewNorm = document.getElementById('normal-mode');
        const viewR3   = document.getElementById('r3-mode');
        if (isR3Mode) {
            btnR3.classList.add('active-r3');
            viewNorm.style.display = 'none';
            viewR3.style.display   = 'flex';
            updateR3UI();
        } else {
            btnR3.classList.remove('active-r3');
            viewNorm.style.display = 'flex';
            viewR3.style.display   = 'none';
            updateNormalUI();
        }
    }

    function selectR3Box(box) {
        triggerHaptic(260);
        if (box !== 'X') {
            activeR3Box = box;
            if (r3Data.X !== '' && r3Data.X !== 'X') r3Data.X = 'X';
            updateR3UI();
        }
    }

    /* ── Atualizar UIs ── */
    function updateNormalUI() {
        elCurrent.innerText = formatDisplay(expr || '0');
        // Histórico: mostra a expressão em construção sempre (exceto logo após resultado)
        if (!isCalculated) {
            elHistory.innerText = expr;
            elHistory.scrollLeft = elHistory.scrollWidth;
        }
    }

    function updateR3UI() {
        ['A','B','C','X'].forEach(b => {
            let el = document.getElementById('box' + b);
            el.innerText = r3Data[b] || (b === 'X' ? 'X' : '');
            el.classList.toggle('active', b === activeR3Box);
        });
    }
</script>
</body>
</html>
